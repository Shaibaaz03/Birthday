<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Countdown ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">


<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;
    padding:15px;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#667eea,#764ba2,#ff758c);

    color:white;

    font-family:'Poppins',sans-serif;

}



.container{

    width:100%;
    max-width:900px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.2);

    border-radius:25px;

    padding:45px;

    text-align:center;

    box-shadow:0 20px 50px rgba(0,0,0,.25);

}



h1{

    margin:10px 0;

    font-size:3rem;

}



.countdown{

    margin-top:45px;

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:20px;

}



.box{

    background:rgba(255,255,255,.18);

    border-radius:18px;

    padding:25px 15px;

}



.box h2{

    margin:0;

    font-size:3rem;

}



.message{

    margin-top:40px;

    font-size:1.4rem;

    font-weight:600;

    color:#fff9c4;

}



footer{

    margin-top:35px;

    opacity:.8;

}





@media(max-width:600px){


.container{

    padding:25px 15px;

}


h1{

    font-size:2rem;

}



.countdown{

    grid-template-columns:repeat(2,1fr);

    gap:12px;

    margin-top:30px;

}



.box{

    padding:18px 10px;

}



.box h2{

    font-size:2rem;

}



.message{

    font-size:1rem;

    margin-top:25px;

}


}



@media(max-width:350px){


.countdown{

    grid-template-columns:1fr;

}


}


</style>


</head>


<body>



<div class="container">


<h3>
🎂 COUNTDOWN TO
</h3>


<h1>
Neha's Birthday ❤️
</h1>


<p>
10 July 2026
</p>



<div class="countdown">


<div class="box">
<h2 id="days">00</h2>
<span>Days</span>
</div>


<div class="box">
<h2 id="hours">00</h2>
<span>Hours</span>
</div>


<div class="box">
<h2 id="minutes">00</h2>
<span>Minutes</span>
</div>


<div class="box">
<h2 id="seconds">00</h2>
<span>Seconds</span>
</div>


</div>



<div class="message" id="message">

Every second brings your special day closer...

</div>



<footer>
Made with ❤️
</footer>


</div>





<script>


// Birthday date
const birthday = new Date("July 10, 2026 00:00:00").getTime();



const days = document.getElementById("days");

const hours = document.getElementById("hours");

const minutes = document.getElementById("minutes");

const seconds = document.getElementById("seconds");

const message = document.getElementById("message");





function updateCountdown(){


const now = new Date().getTime();


const distance = birthday - now;



if(distance <= 0){


days.innerHTML="00";

hours.innerHTML="00";

minutes.innerHTML="00";

seconds.innerHTML="00";


message.innerHTML =
"🎉 Happy Birthday! May all your dreams come true! ❤️";


return;


}




const d = Math.floor(
distance / (1000 * 60 * 60 * 24)
);



const h = Math.floor(
(distance % (1000 * 60 * 60 * 24)) /
(1000 * 60 * 60)
);



const m = Math.floor(
(distance % (1000 * 60 * 60)) /
(1000 * 60)
);



const s = Math.floor(
(distance % (1000 * 60)) /
1000
);



days.innerHTML = String(d).padStart(2,"0");

hours.innerHTML = String(h).padStart(2,"0");

minutes.innerHTML = String(m).padStart(2,"0");

seconds.innerHTML = String(s).padStart(2,"0");



}




// start timer

updateCountdown();


setInterval(updateCountdown,1000);



</script>



</body>

</html>
