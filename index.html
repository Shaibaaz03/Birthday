<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Countdown ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2,#ff758c);
    color:white;
    font-family:'Poppins',sans-serif;
}


.container{

    width:100%;
    max-width:900px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:25px;
    padding:45px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.25);

}


h1{
    margin-top:10px;
    font-size:3rem;
    font-weight:700;
}


.countdown{

    margin-top:45px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;

}


.box{

    background:rgba(255,255,255,.18);
    border-radius:18px;
    padding:25px 15px;

}


.box h2{

    font-size:3rem;
    margin:0;

}


.message{

    margin-top:40px;
    font-size:1.4rem;
    font-weight:600;
    color:#fff9c4;

}


footer{

    margin-top:40px;
    opacity:.8;

}


/* MOBILE */

@media(max-width:600px){

body{

    padding:10px;

}


.container{

    padding:25px 15px;
    border-radius:20px;

}


h1{

    font-size:2rem;

}


h3{

    font-size:14px;

}


p{

    font-size:15px;

}


.countdown{

    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-top:30px;

}


.box{

    padding:18px 10px;

}


.box h2{

    font-size:2rem;

}


.message{

    font-size:1rem;
    margin-top:25px;

}


footer{

    margin-top:25px;

}

}


/* EXTRA SMALL PHONES */

@media(max-width:350px){

.countdown{

    grid-template-columns:1fr;

}

h1{

    font-size:1.7rem;

}

}

</style>

</head>


<body>


<div class="container">


<h3 style="font-weight:400;letter-spacing:2px;">
🎂 COUNTDOWN TO
</h3>


<h1>
Happy Birthday ❤️
</h1>


<p style="margin-top:10px;font-size:18px;">
10 July 2026
</p>



<div class="countdown">


<div class="box">
<h2 id="days">00</h2>
<span>Days</span>
</div>


<div class="box">
<h2 id="hours">00</h2>
<span>Hours</span>
</div>


<div class="box">
<h2 id="minutes">00</h2>
<span>Minutes</span>
</div>


<div class="box">
<h2 id="seconds">00</h2>
<span>Seconds</span>
</div>


</div>



<div id="message" class="message">
💜 Every second brings your special day closer...
</div>



<footer>
Made with ❤️
</footer>



</div>





<script>


const birthday = new Date("July 10, 2026 00:00:00");


const days=document.getElementById("days");
const hours=document.getElementById("hours");
const minutes=document.getElementById("minutes");
const seconds=document.getElementById("seconds");
const message=document.getElementById("message");



if("Notification" in window){

Notification.requestPermission();

}



let lastNotifiedHour=null;



function showNotification(hoursLeft){


if(!("Notification" in window))
return;


if(Notification.permission!=="granted")
return;


if(lastNotifiedHour===hoursLeft)
return;


lastNotifiedHour=hoursLeft;


let text;


if(hoursLeft<=0){

text="🎉 Happy Birthday! Wishing you endless happiness ❤️";

}

else if(hoursLeft===24){

text="🎂 Only 1 day left until your birthday!";

}

else if(hoursLeft===12){

text="🌙 Only 12 hours remaining!";

}

else if(hoursLeft===6){

text="🎁 Only 6 hours left!";

}

else if(hoursLeft===1){

text="🥳 Only ONE hour left!";

}

else{

text=`💖 ${hoursLeft} hours remaining until your birthday!`;

}



new Notification(

"🎂 Birthday Countdown ❤️",

{

body:text,

icon:"https://cdn-icons-png.flaticon.com/512/869/869869.png"

}

);


}





function updateCountdown(){


const now=new Date();

const diff=birthday-now;



if(diff<=0){


days.innerHTML="00";
hours.innerHTML="00";
minutes.innerHTML="00";
seconds.innerHTML="00";


message.innerHTML=
"🎉 Happy Birthday! May all your dreams come true! ❤️";


showNotification(0);


clearInterval(timer);


return;

}




const d=Math.floor(
diff/(1000*60*60*24)
);



const h=Math.floor(
(diff%(1000*60*60*24))/(1000*60*60)
);



const m=Math.floor(
(diff%(1000*60*60))/(1000*60)
);



const s=Math.floor(
(diff%(1000*60))/1000
);



days.innerHTML=String(d).padStart(2,"0");

hours.innerHTML=String(h).padStart(2,"0");

minutes.innerHTML=String(m).padStart(2,"0");

seconds.innerHTML=String(s).padStart(2,"0");



const totalHours=Math.floor(
diff/(1000*60*60)
);



showNotification(totalHours);



}



updateCountdown();


const timer=setInterval(updateCountdown,1000);



</script>


</body>

</html>
